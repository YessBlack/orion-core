name: Release Tag

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write

jobs:
  create-release-tag:
    name: Create Tag On Release PR Merge
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.title, 'release: v')
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from PR title
        id: version
        shell: bash
        run: |
          title="${{ github.event.pull_request.title }}"
          version="${title#release: v}"

          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Invalid release title version: $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create git tag if missing
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const version = '${{ steps.version.outputs.version }}'
            const tag = `v${version}`
            const sha = context.payload.pull_request.merge_commit_sha

            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` })
              core.info(`Tag ${tag} already exists. Skipping.`)
              return
            } catch (error) {
              if (error.status !== 404) throw error
            }

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha
            })

            core.info(`Created tag ${tag} at ${sha}`)

      - name: Create GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const version = '${{ steps.version.outputs.version }}'
            const tag = `v${version}`

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag })
              core.info(`Release for ${tag} already exists. Skipping.`)
              return
            } catch (error) {
              if (error.status !== 404) throw error
            }

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: `Release ${tag}`,
              generate_release_notes: true,
              draft: false,
              prerelease: false
            })

            core.info(`Created GitHub release for ${tag}`)
