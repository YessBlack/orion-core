name: API CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "api/**"
      - ".github/workflows/api-ci.yml"
  push:
    branches:
      - main
    paths:
      - "api/**"
      - ".github/workflows/api-ci.yml"

permissions:
  contents: read

jobs:
  api-ci:
    name: API Lint And Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    env:
      NODE_ENV: test
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      POCKETBASE_URL: http://127.0.0.1:8090
      POCKETBASE_SUPERUSER_EMAIL: ${{ secrets.POCKETBASE_SUPERUSER_EMAIL }}
      POCKETBASE_SUPERUSER_PASSWORD: ${{ secrets.POCKETBASE_SUPERUSER_PASSWORD }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate CI auth secrets and write .env.test
        shell: bash
        run: |
          jwt_secret="$(openssl rand -base64 64)"
          jwt_refresh_secret="$(openssl rand -base64 64)"
          refresh_token_pepper="$(openssl rand -base64 64)"

          echo "::add-mask::$jwt_secret"
          echo "::add-mask::$jwt_refresh_secret"
          echo "::add-mask::$refresh_token_pepper"

          cat > .env.test <<EOF
          NODE_ENV=${NODE_ENV}
          CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
          POCKETBASE_URL=${POCKETBASE_URL}
          POCKETBASE_SUPERUSER_EMAIL=${POCKETBASE_SUPERUSER_EMAIL}
          POCKETBASE_SUPERUSER_PASSWORD=${POCKETBASE_SUPERUSER_PASSWORD}
          TEST_USER_EMAIL=${TEST_USER_EMAIL}
          TEST_USER_PASSWORD=${TEST_USER_PASSWORD}
          JWT_SECRET=${jwt_secret}
          JWT_REFRESH_SECRET=${jwt_refresh_secret}
          REFRESH_TOKEN_PEPPER=${refresh_token_pepper}
          EOF

      - name: Lint API
        run: npm run lint

      - name: Check integration test secrets
        id: api-secrets
        shell: bash
        run: |
          if [ -n "${POCKETBASE_SUPERUSER_EMAIL}" ] && [ -n "${POCKETBASE_SUPERUSER_PASSWORD}" ] && [ -n "${TEST_USER_EMAIL}" ] && [ -n "${TEST_USER_PASSWORD}" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Start PocketBase
        if: steps.api-secrets.outputs.has_secrets == 'true'
        run: |
          PB_VERSION="0.36.9"
          PB_SHA256="514441ad69eeba4e5da6e4728dae7483c6e5328b109fed9c67f66909a006fb5a"

          curl -fL -o pb.zip "https://github.com/pocketbase/pocketbase/releases/download/v${PB_VERSION}/pocketbase_${PB_VERSION}_linux_amd64.zip"
          echo "${PB_SHA256}  pb.zip" | sha256sum -c -
          unzip pb.zip -d pb
          ./pb/pocketbase serve --http=127.0.0.1:8090 --dir=./pb_data > pb.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:8090/api/health && break || sleep 1; done

      - name: Run API integration tests
        if: steps.api-secrets.outputs.has_secrets == 'true'
        run: npm run test:integration

      - name: Warn missing API test secrets
        if: steps.api-secrets.outputs.has_secrets != 'true'
        run: |
          echo "::warning::API integration tests were skipped because required secrets are missing."
          echo "::warning::Set POCKETBASE_SUPERUSER_EMAIL, POCKETBASE_SUPERUSER_PASSWORD, TEST_USER_EMAIL and TEST_USER_PASSWORD in repository secrets."
